version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tuyenshop
    restart: always
    environment:
      POSTGRES_DB: tuyenshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tuyenshop-redis
    restart: always
    ports:
      - "6379:6379"

volumes:upload_preset
  postgres-data:
