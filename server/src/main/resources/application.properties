spring.application.name=server

spring.datasource.url= ${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

tuyenshop.app.jwtSecret=${JWT_SECRET_KEY}
tuyenshop.app.jwtExpirationMs=${JWT_EXPIRATION_MS}

spring.data.redis.url=${REDIS_URL}

server.port=8080

# VNPAY Configuration
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.url=${VNPAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}
vnpay.apiUrl=${VNPAY_API_URL}

cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}

# MoMo Configuration
momo.partnerCode=${MOMO_PARTNER_CODE}
momo.accessKey=${MOMO_ACCESS_KEY}
momo.secretKey=${MOMO_SECRET_KEY}
momo.endpoint=${MOMO_ENDPOINT}
momo.returnUrl=${MOMO_RETURN_URL}
momo.notifyUrl=${MOMO_NOTIFY_URL}


app.sec.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS}

