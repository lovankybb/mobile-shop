version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tuyenshop-db
    restart: always
    environment:
      POSTGRES_DB: tuyenshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tuyenshop-redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tuyenshop-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/tuyenshop
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    env_file:
      - ./server/.env

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tuyenshop-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres-data:
